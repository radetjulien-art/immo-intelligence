version: "3.9"

services:
  # ─────────────────────────────────────────────
  # Base de données principale (PostgreSQL + PostGIS)
  # ─────────────────────────────────────────────
  db:
    image: postgis/postgis:15-3.3
    container_name: immo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-immo_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-immo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-immo_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-immo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Cache + Queue (Redis)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: immo_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Backend API (FastAPI)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: immo_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-immo}:${POSTGRES_PASSWORD:-immo_secret}@db:5432/${POSTGRES_DB:-immo_intelligence}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ─────────────────────────────────────────────
  # Worker Celery (scraping, pipelines data)
  # ─────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: immo_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-immo}:${POSTGRES_PASSWORD:-immo_secret}@db:5432/${POSTGRES_DB:-immo_intelligence}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=4

  # ─────────────────────────────────────────────
  # Scheduler Celery Beat (tâches périodiques)
  # ─────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: immo_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-immo}:${POSTGRES_PASSWORD:-immo_secret}@db:5432/${POSTGRES_DB:-immo_intelligence}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - worker
    command: celery -A tasks.celery_app beat --loglevel=info

  # ─────────────────────────────────────────────
  # Frontend Next.js
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: immo_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
